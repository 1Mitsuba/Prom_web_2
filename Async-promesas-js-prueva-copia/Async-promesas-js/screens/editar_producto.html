<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Producto | Doguito Petshop</title>
    <link rel="icon" href="../assets/img/doguitoadm.svg" type="image/x-icon" />
    <!-- Agregar fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/unified-style.css" />
</head>
<body>
    <header class="header">
      <div class="container flex flex--between">
        <div class="flex flex--center">
          <img
            src="../assets/img/doguitoadm.svg"
            alt="Logotipo Doguito"
            class="header__logo"
          />
          <h1 class="ml-2" style="font-family: var(--font-accent); font-size: var(--text-xl); margin-left: 10px;">Doguito Petshop</h1>
        </div>
        <nav>
          <ul class="header__list-nav">
            <li class="header__link"><a href="./dashboard.html">Dashboard</a></li>
            <li class="header__link"><a href="./lista_productos.html" class="active">Productos</a></li>
            <li class="header__link"><a href="./lista_cliente.html">Clientes</a></li>
            <li class="header__link"><a href="./lista_pets.html">Mascotas</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <div class="container">
        <!-- Cambiar el título por uno con clase form-title -->
        <h1 class="form-title">Editar Producto</h1>
        
        <!-- Agregar div para mensajes/alertas -->
        <div id="result" class="alert" style="display: none;"></div>
        
        <div class="card">
            <form id="productoForm">
                <input type="hidden" id="id_pro" />
                
                <div class="form-group">
                    <label class="form-label" for="nombre">Nombre:</label>
                    <input type="text" class="form-control" id="nombre" placeholder="Nombre del producto" required />
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="precio">Precio:</label>
                    <input type="number" class="form-control" id="precio" placeholder="Precio del producto" min="0" step="0.01" required />
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="descripcion">Descripción:</label>
                    <textarea class="form-control" id="descripcion" placeholder="Descripción del producto" rows="3"></textarea>
                </div>
                
                <div class="text-center">
                    <button type="submit" class="button">Actualizar</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Importar el script externo como un módulo -->
    <script type="module" src="../assets/js/controllers/producto/editar-producto-controller.js"></script>
</body>
</html>
