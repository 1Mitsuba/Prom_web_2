<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrar Mascota | Doguito Pet Store</title>
    <link rel="icon" href="../assets/img/doguitoadm.svg" type="image/x-icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/unified-style.css" />
</head>
<body>
    <header class="header">
      <div class="container flex flex--between">
        <div class="flex flex--center">
          <img
            src="../assets/img/doguitoadm.svg"
            alt="Logotipo Doguito"
            class="header__logo"
          />
          <h1 class="ml-2" style="font-family: var(--font-accent); font-size: var(--text-xl); margin-left: 10px;">Doguito Petshop</h1>
        </div>
        <nav>
          <ul class="header__list-nav">
            <li class="header__link"><a href="./dashboard.html">Dashboard</a></li>
            <li class="header__link"><a href="./lista_productos.html">Productos</a></li>
            <li class="header__link"><a href="./lista_cliente.html">Clientes</a></li>
            <li class="header__link"><a href="./lista_pets.html">Mascotas</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container">
        <div class="card">
            <h2 class="card__title">Registrar Mascota</h2>
            
            <div class="alert" id="result" style="display: none;"></div>
            
            <form id="petForm" class="form">
                <div class="grid-2-cols">
                    <div class="form-group">
                        <label class="form-label" for="nombre">Nombre <span class="text-danger">*</span></label>
                        <input type="text" id="nombre" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="raza">Raza</label>
                        <input type="text" id="raza" class="form-control">
                    </div>
                </div>
                
                <div class="grid-2-cols">
                    <div class="form-group">
                        <label class="form-label" for="edad">Edad (años)</label>
                        <input type="number" id="edad" class="form-control" min="0" max="30">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="dueno">Dueño <span class="text-danger">*</span></label>
                        <select id="dueno" class="form-control" required>
                            <option value="">Seleccionar dueño</option>
                            <!-- Opciones se cargarán dinámicamente -->
                        </select>
                    </div>
                </div>
                
                <div class="form-group text-center mt-3">
                    <button type="submit" class="button">Registrar Mascota</button>
                </div>
            </form>
        </div>
    </main>
    
    <script>
        // Cargar clientes
        fetch('http://localhost/api/conexciion1.php')
          .then(res => res.json())
          .then(clientes => {
            const select = document.getElementById('dueno');
            clientes.forEach(c => {
              const option = document.createElement('option');
              option.value = c.id;
              option.textContent = c.nombre;
              select.appendChild(option);
            });
          })
          .catch(err => {
            mostrarMensaje('Error cargando clientes: ' + err.message, true);
          });
    
        // Función para mostrar mensajes
        function mostrarMensaje(mensaje, esError = false) {
            const resultElement = document.getElementById('result');
            resultElement.textContent = mensaje;
            resultElement.className = esError ? 
                'alert alert--danger' : 
                'alert alert--success';
            resultElement.style.display = 'block';
            
            if (!esError) {
                setTimeout(() => {
                    window.location.href = './lista_pets.html?created=true';
                }, 1500);
            }
        }
    
        // Manejar envío
        document.getElementById('petForm').addEventListener('submit', function(e) {
          e.preventDefault();
          
          const data = {
            id_pet: 'pet_' + Math.random().toString(36).substring(2, 15),
            nombre: document.getElementById('nombre').value,
            raza: document.getElementById('raza').value,
            edad: document.getElementById('edad').value || null,
            id: document.getElementById('dueno').value
          };
          
          fetch('http://localhost/api/mascotas.php', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
          })
          .then(res => {
            console.log("Respuesta del servidor:", res.status, res.statusText);
            return res.text().then(text => {
              try {
                return JSON.parse(text);
              } catch (e) {
                console.error("Error al parsear respuesta:", text);
                throw new Error("Respuesta del servidor no válida: " + text);
              }
            });
          })
          .then(result => {
            console.log("Procesado con éxito:", result);
            mostrarMensaje('Mascota registrada con éxito');
          })
          .catch(err => {
            console.error("Error completo:", err);
            mostrarMensaje('Error: ' + err.message, true);
          });
        });
    </script>
    
    <style>
        .grid-2-cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
        }
        
        @media (max-width: 768px) {
            .grid-2-cols {
                grid-template-columns: 1fr;
            }
        }
    </style>
</body>
</html>
