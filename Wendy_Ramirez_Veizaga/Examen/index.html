<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Evaluación DOM</title>
    <style>
        .task { padding: 10px; margin: 5px; border: 1px solid #ccc; }
        .relleno { background-image: linear-gradient(
                                    109.6deg,
                                rgb(114, 3, 250) 14.2%,
                                rgb(61, 184, 255) 100.2%
                        );
                        border-radius: 10px;
                }
        .tachado { text-decoration: line-through; color: #999; }
    </style>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=task" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h2>
            
            <span class="material-symbols-outlined">
                task 
            </span>
            Lista de Tareas 
        </h2>
        <input type="text" id="newItem" data-input placeholder="Nueva tarea">
        <button id="addBtn" data-btn >Agregar</button>
        <ul id="taskList" data-list >
            <li class="item">Tarea de ejemplo 1</li>
            <li class="item">Tarea de ejemplo 2</li>
        </ul>
        
        <div id="controls">
            <button id="toggleBtn" data-btn-tachar >Tachar Último</button>
            <button id="countBtn" data-btn-contar >Contar Items</button>
        </div>
        <div id="output"></div>
    </div>

    <script src="js/agregar.js"></script>
    <script src="js/tachar.js"></script>
    <script src="js/contar.js"></script>
    <script src="js/relleno.js"></script>
    
</body>
</html>
