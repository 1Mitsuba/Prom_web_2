<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 3: Sleccion con querySelector</title>
</head>
<body>
    <input type="text" id="elemneto" value="Valor inicial">
    <script>
        const inputElement = document.querySelector('elemneto[type="text"]');
        inputElement.value="Wendy";
    </script>
</body>
</html>
