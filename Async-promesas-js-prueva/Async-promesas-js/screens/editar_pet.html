<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Mascota | Doguito Pet Store</title>
    <link rel="icon" href="../assets/img/doguitoadm.svg" type="image/x-icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/unified-style.css" />
</head>
<body>
    <header class="header">
      <div class="container flex flex--between">
        <div class="flex flex--center">
          <img
            src="../assets/img/doguitoadm.svg"
            alt="Logotipo Doguito"
            class="header__logo"
          />
          <h1 class="ml-2" style="font-family: var(--font-accent); font-size: var(--text-xl); margin-left: 10px;">Doguito Petshop</h1>
        </div>
        <nav>
          <ul class="header__list-nav">
            <li class="header__link"><a href="./dashboard.html">Dashboard</a></li>
            <li class="header__link"><a href="./lista_productos.html">Productos</a></li>
            <li class="header__link"><a href="./lista_cliente.html">Clientes</a></li>
            <li class="header__link"><a href="./lista_pets.html">Mascotas</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container">
        <div class="card">
            <h2 class="card__title">Editar Mascota</h2>
            
            <div class="alert" id="result" style="display: none;"></div>
            
            <form id="petForm" class="form">
                <input type="hidden" id="id_pet">
                
                <div class="form-group">
                    <label class="form-label" for="nombre">Nombre <span class="text-danger">*</span></label>
                    <input type="text" id="nombre" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="raza">Raza</label>
                    <input type="text" id="raza" class="form-control">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="edad">Edad</label>
                    <input type="number" id="edad" class="form-control" min="0">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="dueno">Dueño <span class="text-danger">*</span></label>
                    <select id="dueno" class="form-control" required>
                        <option value="">Seleccionar dueño</option>
                        <!-- Opciones se cargarán dinámicamente -->
                    </select>
                </div>
                
                <div class="form-group text-center mt-3">
                    <button type="submit" class="button">Actualizar Mascota</button>
                </div>
            </form>
        </div>
    </main>
    
    <script>
        const SUPABASE_URL = 'https://fqxjajxbjlnyrdvdofrq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxeGphanhiamxueXJkdmRvZnJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDcwNDg1OTUsImV4cCI6MjA2MjYyNDU5NX0.tmC35WfvvFGwfYaOvBDLLmKVmGtq9cU-ojk2H4EHyV8';
        const HEADER = {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json'
        };
        
        // Obtener ID de mascota de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const petId = urlParams.get('id');
        
        if (!petId) {
            mostrarMensaje('ID de mascota no proporcionado en la URL', true);
        }
        
        // Elementos del formulario
        const formElement = document.getElementById('petForm');
        const idElement = document.getElementById('id_pet');
        const nombreElement = document.getElementById('nombre');
        const razaElement = document.getElementById('raza');
        const edadElement = document.getElementById('edad');
        const duenoElement = document.getElementById('dueno');
        const resultElement = document.getElementById('result');
        
        // Función para mostrar mensajes
        function mostrarMensaje(mensaje, esError = false) {
            resultElement.textContent = mensaje;
            resultElement.className = esError ? 
                'alert alert--danger' : 
                'alert alert--success';
            resultElement.style.display = 'block';
            
            if (!esError) {
                setTimeout(() => {
                    window.location.href = './lista_pets.html?updated=true';
                }, 1500);
            }
        }
        
        // Cargar clientes
        async function cargarClientes() {
            try {
                console.log("Cargando clientes...");
                const response = await fetch(`${SUPABASE_URL}/rest/v1/cliente?select=id,nombre`, {
                    headers: HEADER
                });
                
                if (!response.ok) {
                    throw new Error(`Error HTTP: ${response.status}`);
                }
                
                const clientes = await response.json();
                console.log("Clientes recibidos:", clientes);
                
                clientes.forEach(cliente => {
                    const option = document.createElement('option');
                    option.value = cliente.id;
                    option.textContent = cliente.nombre;
                    duenoElement.appendChild(option);
                });
                
                return clientes;
            } catch (error) {
                console.error('Error cargando clientes:', error);
                mostrarMensaje('Error cargando clientes: ' + error.message, true);
                throw error;
            }
        }
        
        // Cargar datos de mascota
        async function cargarDatosMascota(id) {
            try {
                console.log("Cargando datos de mascota:", id);
                const response = await fetch(`${SUPABASE_URL}/rest/v1/pet?id_pet=eq.${id}&select=*`, {
                    headers: HEADER
                });
                
                if (!response.ok) {
                    throw new Error(`Error HTTP: ${response.status}`);
                }
                
                const mascotasData = await response.json();
                
                if (mascotasData.length === 0) {
                    throw new Error("No se encontró la mascota");
                }
                
                const mascota = mascotasData[0];
                console.log('Datos de la mascota:', mascota);
                
                // Llenar el formulario con los datos
                idElement.value = mascota.id_pet || '';
                nombreElement.value = mascota.nombre || '';
                razaElement.value = mascota.raza || '';
                edadElement.value = mascota.edad || '';
                
                if (mascota.id) {
                    // Asegurar que la opción exista antes de seleccionarla
                    const opcionExistente = Array.from(duenoElement.options).some(option => option.value == mascota.id);
                    if (!opcionExistente) {
                        console.warn(`Advertencia: El dueño con ID ${mascota.id} no está en la lista de opciones`);
                    }
                    duenoElement.value = mascota.id;
                }
                
                return mascota;
            } catch (error) {
                console.error('Error cargando mascota:', error);
                mostrarMensaje('Error cargando mascota: ' + error.message, true);
                throw error;
            }
        }
        
        // Inicializar página
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                mostrarMensaje("Cargando datos...");
                
                // Primero cargar clientes
                await cargarClientes();
                
                // Luego cargar datos de la mascota
                await cargarDatosMascota(petId);
                
                // Ocultar mensaje de carga
                resultElement.style.display = 'none';
            } catch (error) {
                console.error('Error inicializando página:', error);
            }
        });
        
        // Manejar envío del formulario
        formElement.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            try {
                // Mostrar mensaje de procesamiento
                mostrarMensaje('Actualizando...');
                
                // Validar datos
                if (!nombreElement.value.trim()) {
                    throw new Error("El nombre de la mascota es obligatorio");
                }
                
                if (!duenoElement.value) {
                    throw new Error("Debe seleccionar un dueño");
                }
                
                const mascotaActualizada = {
                    nombre: nombreElement.value,
                    raza: razaElement.value,
                    edad: parseInt(edadElement.value) || 0,
                    id: duenoElement.value
                };
                
                console.log("Datos actualizados:", mascotaActualizada);
                
                // Enviar actualización a Supabase
                const response = await fetch(`${SUPABASE_URL}/rest/v1/pet?id_pet=eq.${petId}`, {
                    method: 'PATCH',
                    headers: HEADER,
                    body: JSON.stringify(mascotaActualizada)
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Error ${response.status}: ${errorText}`);
                }
                
                mostrarMensaje('¡Mascota actualizada con éxito!');
            } catch (error) {
                console.error('Error al actualizar:', error);
                mostrarMensaje('Error: ' + error.message, true);
            }
        });
    </script>
    
    <style>
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        
        .form-control {
            display: block;
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }
        
        .text-danger {
            color: red;
        }
        
        .mt-3 {
            margin-top: 1.5rem;
        }
    </style>
</body>
</html>
