<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de API</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
        h1 { color: #2c3e50; }
        button { padding: 10px 15px; margin: 5px; background: #3498db; color: white; border: none; cursor: pointer; border-radius: 4px; }
        button:hover { background: #2980b9; }
        pre { background: #f8f9fa; padding: 15px; border-radius: 4px; overflow-x: auto; }
        .success { color: #27ae60; }
        .error { color: #e74c3c; }
        .api-section { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <h1>Herramienta de Diagnóstico de API</h1>
    
    <div class="api-section">
        <h2>API de Clientes</h2>
        <button id="testClientes">Probar API de Clientes</button>
        <pre id="resultClientes">Presiona el botón para probar...</pre>
    </div>
    
    <div class="api-section">
        <h2>API de Productos</h2>
        <button id="testProductos">Probar API de Productos</button>
        <pre id="resultProductos">Presiona el botón para probar...</pre>
    </div>
    
    <div class="api-section">
        <h2>API de Mascotas</h2>
        <button id="testMascotas">Probar API de Mascotas</button>
        <pre id="resultMascotas">Presiona el botón para probar...</pre>
    </div>
    
    <script>
        // Función para probar una API
        function testApi(url, resultElement) {
            resultElement.innerHTML = "Consultando...";
            resultElement.className = "";
            
            fetch(url)
                .then(response => {
                    resultElement.innerHTML += `\nCódigo de estado: ${response.status} ${response.statusText}`;
                    
                    if (!response.ok) {
                        throw new Error(`Error HTTP: ${response.status}`);
                    }
                    
                    return response.json();
                })
                .then(data => {
                    const isArray = Array.isArray(data);
                    const count = isArray ? data.length : (typeof data === 'object' ? Object.keys(data).length : 0);
                    
                    resultElement.innerHTML += `\n✅ Éxito! Tipo de datos: ${isArray ? 'Array' : typeof data}`;
                    resultElement.innerHTML += `\nCantidad de elementos: ${count}`;
                    resultElement.innerHTML += `\n\nDatos:\n${JSON.stringify(data, null, 2)}`;
                    resultElement.className = "success";
                })
                .catch(error => {
                    resultElement.innerHTML += `\n❌ Error: ${error.message}`;
                    resultElement.className = "error";
                });
        }
        
        // Configurar botones
        document.getElementById('testClientes').addEventListener('click', function() {
            testApi('http://localhost/api/conexciion1.php', document.getElementById('resultClientes'));
        });
        
        document.getElementById('testProductos').addEventListener('click', function() {
            testApi('http://localhost/api/productos.php', document.getElementById('resultProductos'));
        });
        
        document.getElementById('testMascotas').addEventListener('click', function() {
            testApi('http://localhost/api/mascotas.php', document.getElementById('resultMascotas'));
        });
    </script>
</body>
</html>
