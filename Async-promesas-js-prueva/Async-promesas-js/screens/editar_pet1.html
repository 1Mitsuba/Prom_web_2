<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doguito Petshop | Editar Mascota</title>
    <link rel="icon" href="../assets/img/doguitoadm.svg" type="image/x-icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/base/base.css" />
    <link rel="stylesheet" href="../assets/css/componentes/header.css" />
    <link rel="stylesheet" href="../assets/css/componentes/card.css" />
    <link rel="stylesheet" href="../assets/css/registro_cliente.css" />
    <link rel="stylesheet" href="../assets/css/componentes/inputs.css" />
    <link rel="stylesheet" href="../assets/css/componentes/button.css" />
    <link rel="stylesheet" href="../assets/css/componentes/select.css" />
  </head>
  <body>
    <header class="header container">
      <img
        src="../assets/img/doguitoadm.svg"
        alt="Logo Doguito"
        class="header__logo"
      />
      <nav>
        <ul class="header__list-nav">
          <li class="header__link"><a href="./dashboard.html">Dashboard</a></li>
          <li class="header__link"><a href="./lista_productos.html">Productos</a></li>
          <li class="header__link"><a href="./lista_cliente.html">Clientes</a></li>
          <li class="header__link"><a href="./lista_pets.html">Pets</a></li>
        </ul>
      </nav>
    </header>
    <main class="container flex flex--center flex--column">
      <section class="card card--register">
        <h1 class="card__title">Editar Mascota</h1>
        <form class="flex flex--column" data-form>
          <div class="input-container">
            <input
              name="nombre"
              id="nombre"
              class="input"
              type="text"
              placeholder="Nombre de la mascota"
              required
              data-nombre
            />
            <label class="input-label" for="nombre">Nombre</label>
          </div>
          <div class="input-container">
            <input
              name="raza"
              id="raza"
              class="input"
              type="text"
              placeholder="Raza"
              data-raza
            />
            <label class="input-label" for="raza">Raza</label>
          </div>
          <div class="input-container">
            <input
              name="edad"
              id="edad"
              class="input"
              type="number"
              placeholder="Edad"
              data-edad
            />
            <label class="input-label" for="edad">Edad</label>
          </div>
          <div class="input-container">
            <select id="cliente" name="cliente" class="input" data-cliente>
              <option value="">Seleccionar dueño</option>
              <!-- Las opciones se cargarán dinámicamente -->
            </select>
            <label class="input-label" for="cliente">Dueño</label>
          </div>
          <button type="submit" class="button">Actualizar mascota</button>
        </form>
      </section>
    </main>
  </body>
  <script type="module" src="../controllers/editar_pet_controller.js"></script>
</html>
