<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrar Mascota | Doguito Pet Store</title>
    <link rel="icon" href="../assets/img/doguitoadm.svg" type="image/x-icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/unified-style.css" />
</head>
<body>
    <header class="header">
      <div class="container flex flex--between">
        <div class="flex flex--center">
          <img
            src="../assets/img/doguitoadm.svg"
            alt="Logotipo Doguito"
            class="header__logo"
          />
          <h1 class="ml-2" style="font-family: var(--font-accent); font-size: var(--text-xl); margin-left: 10px;">Doguito Petshop</h1>
        </div>
        <nav>
          <ul class="header__list-nav">
            <li class="header__link"><a href="./dashboard.html">Dashboard</a></li>
            <li class="header__link"><a href="./lista_productos.html">Productos</a></li>
            <li class="header__link"><a href="./lista_cliente.html">Clientes</a></li>
            <li class="header__link"><a href="./lista_pets.html">Mascotas</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container">
        <div class="card">
            <h2 class="card__title">Registrar Mascota</h2>
            
            <div class="alert" id="result" style="display: none;"></div>
            
            <form id="petForm" class="form">
                <div class="form-group">
                    <label class="form-label" for="nombre">Nombre <span class="text-danger">*</span></label>
                    <input type="text" id="nombre" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="raza">Raza</label>
                    <input type="text" id="raza" class="form-control">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="edad">Edad</label>
                    <input type="number" id="edad" class="form-control" min="0">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="dueno">Dueño <span class="text-danger">*</span></label>
                    <select id="dueno" class="form-control" required>
                        <option value="">Seleccionar dueño</option>
                        <!-- Opciones se cargarán dinámicamente -->
                    </select>
                </div>
                
                <div class="form-group text-center mt-3">
                    <button type="submit" class="button">Registrar Mascota</button>
                </div>
            </form>
        </div>
    </main>
    
    <script>
        const SUPABASE_URL = 'https://fqxjajxbjlnyrdvdofrq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxeGphanhiamxueXJkdmRvZnJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDcwNDg1OTUsImV4cCI6MjA2MjYyNDU5NX0.tmC35WfvvFGwfYaOvBDLLmKVmGtq9cU-ojk2H4EHyV8';
        const HEADER = {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json'
        };
        
        // Función para mostrar mensajes
        function mostrarMensaje(mensaje, esError = false) {
            const resultElement = document.getElementById('result');
            resultElement.textContent = mensaje;
            resultElement.className = esError ? 
                'alert alert--danger' : 
                'alert alert--success';
            resultElement.style.display = 'block';
            
            if (!esError) {
                setTimeout(() => {
                    window.location.href = './lista_pets.html?created=true';
                }, 1500);
            }
        }
        
        // Cargar clientes cuando se carga la página
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                // Cargar lista de clientes para el selector
                const response = await fetch(`${SUPABASE_URL}/rest/v1/cliente?select=id,nombre`, {
                    headers: HEADER
                });
                
                if (!response.ok) {
                    throw new Error(`Error HTTP: ${response.status}`);
                }
                
                const clientes = await response.json();
                console.log("Clientes cargados:", clientes);
                
                // Rellenar el selector de dueños
                const duenoSelect = document.getElementById('dueno');
                
                clientes.forEach(cliente => {
                    const option = document.createElement('option');
                    option.value = cliente.id;
                    option.textContent = cliente.nombre;
                    duenoSelect.appendChild(option);
                });
                
            } catch (error) {
                console.error("Error cargando clientes:", error);
                mostrarMensaje("Error cargando lista de clientes: " + error.message, true);
            }
        });
        
        // Manejar envío del formulario
        document.getElementById('petForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            try {
                // Generar UUID para id_pet
                const id_pet = crypto.randomUUID(); // Genera un UUID v4 usando la API nativa
                
                // Crear objeto mascota con los datos del formulario
                const mascota = {
                    id_pet: id_pet, // Añadimos el id_pet generado
                    nombre: document.getElementById('nombre').value,
                    raza: document.getElementById('raza').value || null,
                    edad: parseInt(document.getElementById('edad').value) || 0,
                    id: document.getElementById('dueno').value // ID del cliente (dueño)
                };
                
                console.log("Datos de mascota a registrar:", mascota);
                
                // Validaciones
                if (!mascota.nombre) {
                    throw new Error("El nombre de la mascota es obligatorio");
                }
                
                if (!mascota.id) {
                    throw new Error("Debe seleccionar un dueño");
                }
                
                // Mostrar mensaje de procesamiento
                mostrarMensaje("Registrando mascota...");
                
                // Enviar a Supabase
                const response = await fetch(`${SUPABASE_URL}/rest/v1/pet`, {
                    method: 'POST',
                    headers: HEADER,
                    body: JSON.stringify(mascota)
                });
                
                console.log("Respuesta:", response.status, response.statusText);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Error ${response.status}: ${errorText}`);
                }
                
                console.log("Mascota registrada exitosamente");
                mostrarMensaje("Mascota registrada con éxito");
                
            } catch (error) {
                console.error("Error al registrar mascota:", error);
                mostrarMensaje("Error: " + error.message, true);
            }
        });
    </script>
    
    <style>
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        
        .form-control {
            display: block;
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }
        
        .text-danger {
            color: red;
        }
        
        .mt-3 {
            margin-top: 1.5rem;
        }
    </style>
</body>
</html>
