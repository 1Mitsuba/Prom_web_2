<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de Mascotas | Doguito Petshop</title>
    <link rel="icon" href="../assets/img/doguitoadm.svg" type="image/x-icon" />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/unified-style.css" />
</head>
<body style="background: linear-gradient(135deg, #e6f3ff, #e6faff);">
    <!-- Navbar mejorado -->
    <nav class="navbar">
        <div class="container">
            <a href="./dashboard.html" class="navbar-brand">
                <img src="../assets/img/doguitoadm.svg" alt="Doguito Petshop Logo">
                <h1>Doguito Petshop</h1>
            </a>
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a href="./dashboard.html" class="nav-link">
                        <i class="fas fa-home"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="./lista_productos.html" class="nav-link">
                        <i class="fas fa-box"></i> Productos
                    </a>
                </li>
                <li class="nav-item">
                    <a href="./lista_cliente.html" class="nav-link">
                        <i class="fas fa-users"></i> Clientes
                    </a>
                </li>
                <li class="nav-item">
                    <a href="./lista_pets.html" class="nav-link active">
                        <i class="fas fa-paw"></i> Mascotas
                    </a>
                </li>
            </ul>
        </div>
    </nav>
    
    <!-- Contenido principal -->
    <div class="content-wrapper">
        <!-- Título de la página -->
        <div class="page-title-wrapper">
            <h1 class="page-title">Lista de Mascotas</h1>
            <p class="page-subtitle">Gestiona las mascotas registradas en tu tienda</p>
        </div>
        
        <!-- Alerta para mensajes -->
        <div id="result" class="alert" style="display: none;"></div>
        
        <!-- Sección de mascotas -->
        <div class="section-header">
            <h2 class="section-title">Mascotas</h2>
            <a href="./registrar_pet.html" class="action-button-primary">
                <i class="fas fa-plus"></i> Nueva Mascota
            </a>
        </div>
        
        <!-- Tabla de mascotas -->
        <table class="data-table">
            <thead>
                <tr>
                    <th>NOMBRE</th>
                    <th>DUEÑO</th>
                    <th>RAZA</th>
                    <th>EDAD</th>
                    <th>ACCIONES</th>
                </tr>
            </thead>
            <tbody id="tabla-mascotas">
                <!-- Aquí se cargarán las mascotas dinámicamente -->
            </tbody>
        </table>
    </div>
    
    <script type="module" src="../assets/js/controllers/pet/lista-pet-controller.js"></script>
</body>
</html>
