<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clientes | Doguito Pet Store</title>
    <link rel="icon" href="../assets/img/doguitoadm.svg" type="image/x-icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <!-- Carga primero los estilos base -->
    <link rel="stylesheet" href="../assets/css/base/base.css" />
    <!-- Luego carga el nuevo estilo unificado -->
    <link rel="stylesheet" href="../assets/css/unified-style.css" />
</head>
<body>
    <header class="header">
      <div class="container flex flex--between">
        <div class="flex flex--center">
          <img
            src="../assets/img/doguitoadm.svg"
            alt="Logotipo Doguito"
            class="header__logo"
          />
          <h1 class="ml-2" style="font-family: var(--font-accent); font-size: var(--text-xl); margin-left: 10px;">Doguito Petshop</h1>
        </div>
        <nav>
          <ul class="header__list-nav">
            <li class="header__link"><a href="./dashboard.html">Dashboard</a></li>
            <li class="header__link"><a href="./lista_productos.html">Productos</a></li>
            <li class="header__link"><a href="./lista_cliente.html" class="active">Clientes</a></li>
            <li class="header__link"><a href="./lista_pets.html">Mascotas</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container">
        <div class="flex flex--between mb-3">
            <h2>Lista de Clientes</h2>
            <a href="./registrar_cliente.html" class="button">+ Nuevo Cliente</a>
        </div>
        
        <!-- Alerta de acción completada -->
        <div class="alert alert--success" id="actionAlert" style="display: none;">
            Acción completada con éxito
        </div>
      
        <div class="card p-0">
            <table class="table">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th style="text-align: center; width: 120px;">Acciones</th>
                    </tr>
                </thead>
                <tbody data-table>
                    <!-- Los clientes se insertarán aquí dinámicamente -->
                    <tr>
                        <td colspan="3" class="text-center">Cargando clientes...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <!-- Para lista_cliente.html, añadir antes del cierre de </main> -->
<div class="modal-container modal--close">
  <div class="modal">
    <h3 class="modal__title">Confirmar eliminación</h3>
    <button class="modal__close">&times;</button>
    <p class="modal__text">¿Estás seguro de que deseas eliminar este cliente?</p>
    <div class="flex flex--center">
      <button class="button button--danger modal__button--confirm mr-2">
        Eliminar
      </button>
      <button class="button button--secondary">
        Cancelar
      </button>
    </div>
  </div>
</div>
    </main>
    
    <!-- <script type="module" src="../controllers/client_controller.js"></script> -->
    <script>
document.addEventListener('DOMContentLoaded', async function() {
    const tbody = document.querySelector('[data-table]');
    const SUPABASE_URL = 'https://fqxjajxbjlnyrdvdofrq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxeGphanhiamxueXJkdmRvZnJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDcwNDg1OTUsImV4cCI6MjA2MjYyNDU5NX0.tmC35WfvvFGwfYaOvBDLLmKVmGtq9cU-ojk2H4EHyV8';
    
    try {
        console.log('Intentando cargar clientes directamente...');
        const response = await fetch(`${SUPABASE_URL}/rest/v1/cliente?select=*`, {
            headers: {
                apikey: SUPABASE_KEY,
                Authorization: `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json'
            }
        });
        
        console.log('Respuesta:', response.status, response.statusText);
        
        if (!response.ok) {
            throw new Error(`Error HTTP: ${response.status}`);
        }
        
        const clientes = await response.json();
        console.log('Clientes cargados:', clientes);
        
        // Limpiar tabla
        tbody.innerHTML = '';
        
        // Mostrar clientes
        if (clientes.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" class="text-center">No hay clientes registrados</td></tr>';
        } else {
            clientes.forEach(cliente => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${cliente.nombre || 'Sin nombre'}</td>
                    <td>${cliente.emal || 'Sin email'}</td>
                    <td class="text-right">
                        <div class="table-actions">
                            <a href="../screens/editar_cliente.html?id=${cliente.id}" class="action-button edit">
                                <span>✏️</span>
                            </a>
                            <button class="action-button delete" type="button" data-id="${cliente.id}">
                                <span>🗑️</span>
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
            
            // Configurar botones de eliminar
            document.querySelectorAll('.delete').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.getAttribute('data-id');
                    const modal = document.querySelector(".modal-container");
                    modal.classList.remove("modal--close");
                    modal.dataset.targetId = id;
                });
            });
            
            // Configurar botón de confirmar eliminación
            document.querySelector('.modal__button--confirm').addEventListener('click', async function() {
                const id = document.querySelector('.modal-container').dataset.targetId;
                if (!id) return;
                
                try {
                    const deleteResponse = await fetch(`${SUPABASE_URL}/rest/v1/cliente?id=eq.${id}`, {
                        method: 'DELETE',
                        headers: {
                            apikey: SUPABASE_KEY,
                            Authorization: `Bearer ${SUPABASE_KEY}`
                        }
                    });
                    
                    if (!deleteResponse.ok) {
                        throw new Error(`Error al eliminar: ${deleteResponse.status}`);
                    }
                    
                    // Cerrar modal
                    document.querySelector('.modal-container').classList.add('modal--close');
                    
                    // Mostrar notificación
                    const alertElement = document.getElementById('actionAlert');
                    alertElement.textContent = 'Cliente eliminado con éxito';
                    alertElement.style.display = 'block';
                    
                    // Recargar página después de 1.5 segundos
                    setTimeout(() => {
                        window.location.reload();
                    }, 1500);
                    
                } catch (error) {
                    console.error('Error al eliminar:', error);
                    alert('Error al eliminar cliente: ' + error.message);
                }
            });
            
            // Configurar botón para cerrar modal
            document.querySelector('.modal__close').addEventListener('click', function() {
                document.querySelector('.modal-container').classList.add('modal--close');
            });
            
            document.querySelector('.button--secondary').addEventListener('click', function() {
                document.querySelector('.modal-container').classList.add('modal--close');
            });
        }
    } catch (error) {
        console.error('Error cargando clientes:', error);
        tbody.innerHTML = '<tr><td colspan="3" class="text-center">Error al cargar clientes: ' + error.message + '</td></tr>';
    }
});
</script>
</body>
</html>
