<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Tareas | Tareas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../css/styles.css">
<link rel="stylesheet" href="../../css/components.css">
<link rel="stylesheet" href="../../css/layout.css">
<link rel="stylesheet" href="../../css/utilities.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand" href="../../index.html">Gestión de Tareas</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="../../index.html">Dashboard</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="../usuarios/lista.html">Usuarios</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="../equipos/lista.html">Equipos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="../proyectos/lista.html">Proyectos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="lista.html">Tareas</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Gestión de Tareas</h1>
            <a href="registro.html" class="btn btn-primary">Nueva Tarea</a>
        </div>
        
        <div class="mb-4">
            <div class="card">
                <div class="card-header">
                    <h5>Filtros</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="filtro-proyecto" class="form-label">Proyecto</label>
                            <select class="form-select" id="filtro-proyecto">
                                <option value="">Todos los proyectos</option>
                                <!-- Se cargará dinámicamente -->
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="filtro-estado" class="form-label">Estado</label>
                            <select class="form-select" id="filtro-estado">
                                <option value="">Todos los estados</option>
                                <option value="pendiente">Pendiente</option>
                                <option value="en progreso">En progreso</option>
                                <option value="completada">Completada</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="filtro-prioridad" class="form-label">Prioridad</label>
                            <select class="form-select" id="filtro-prioridad">
                                <option value="">Todas las prioridades</option>
                                <option value="baja">Baja</option>
                                <option value="media">Media</option>
                                <option value="alta">Alta</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Título</th>
                                <th>Proyecto</th>
                                <th>Descripción</th>
                                <th>Asignado a</th>
                                <th>Prioridad</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-tareas">
                            <!-- Aquí se cargarán las tareas dinámicamente -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white mt-5 py-3">
        <div class="container text-center">
            <p>&copy; 2023 Gestión de Tareas</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../../controlers/tarea-controller.js"></script>
</body>
</html>
